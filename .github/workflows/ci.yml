name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20 # a hung dev-server webServer would otherwise burn the 6h default
    env:
      # Build/typecheck only need a syntactically valid URL; tests provision their
      # own disposable test DB (see vitest.globalSetup.ts).
      DATABASE_URL: "file:./dev.db"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24 # match the npm 11 that generated package-lock.json
          cache: npm

      - run: npm ci # runs postinstall -> prisma generate

      - run: npm run lint
      - run: npm run format
      - run: npm run typecheck

      - run: npm run test:coverage
      - run: npm audit --omit=dev --audit-level=high # gate on shipped deps, not dev tooling

      - run: npm run build

      - run: npx playwright install --with-deps chromium
      - run: npm run e2e

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage
          path: coverage/
          if-no-files-found: ignore

      # Playwright trace + HTML report for debugging a red e2e run (retain-on-failure in the config).
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          if-no-files-found: ignore
