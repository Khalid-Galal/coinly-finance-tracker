# Render Blueprint — https://render.com/docs/blueprint-spec
# Deploys the Next.js app as a free web service. Node 24 matches the npm 11 lockfile.
services:
  - type: web
    name: coinly
    runtime: node
    plan: free
    region: frankfurt
    branch: main
    autoDeploy: true
    # `prisma migrate deploy` creates the schema + read-only QA views before the build,
    # so every DB-backed route works on a fresh deploy.
    buildCommand: npm ci && npx prisma migrate deploy && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: "24"
      # SQLite on Render's disk. NOTE: the free tier's disk is EPHEMERAL — data resets on
      # redeploy/restart. For persistence across deploys, provision Turso libSQL and wire the
      # @prisma/adapter-libsql driver in lib/server/db.ts (see DESIGN.md "Deployment options").
      - key: DATABASE_URL
        value: "file:./coinly.db"
      # Set this in the Render dashboard (Environment) — it gates /api/* on the live instance.
      - key: APP_PASSCODE
        sync: false
